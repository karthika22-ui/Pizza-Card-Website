<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Complete</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-image: url(piz7.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background-color:khaki;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow:plum;
      max-width: 500px;
      width: 90%;

      margin-left: 90px;
    }

    .box h1 {
      color: #27ae60;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .box p {
      font-size: 18px;
      color: #444;
      margin-bottom: 20px;
    }

    .box .emoji {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .box a {
      display: inline-block;
      text-decoration: none;
      padding: 10px 20px;
      background: #e67e22;
      color: white;
      border-radius: 6px;
      transition: background 0.3s ease;
    }

    .box a:hover {
      background: #d35400;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="emoji">✅🍕</div>
    <h1>Thank You for Your Order!</h1>
    <h3>Your delicious pizzas are being prepared.<br>We will deliver them shortly!</h3>
    <a href="order.html">Order Again</a>
  </div>

</body>
</html>
